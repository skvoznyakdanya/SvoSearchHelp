<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}Помощь семьям военнослужащих{% endblock %}</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
background:#f6f8fb;
color:#2d3748;
line-height:1.6;
}

/* HEADER */

header{
background:white;
border-bottom:1px solid #e6e9ee;
}

nav{
max-width:1200px;
margin:auto;
padding:18px 20px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

.logo{
font-size:18px;
font-weight:600;
color:#1a202c;
}

.menu{
display:flex;
gap:25px;
flex-wrap:wrap;
}

.menu a{
text-decoration:none;
color:#4a5568;
font-size:15px;
font-weight:500;
padding:6px 10px;
border-radius:6px;
transition:0.2s;
}

.menu a:hover{
background:#edf2f7;
color:#2b6cb0;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* HERO */

.hero{
background:white;
padding:70px 40px;
border-radius:14px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.hero h1{
font-size:36px;
margin-bottom:15px;
color:#1a202c;
}

.hero p{
color:#718096;
max-width:650px;
margin:auto;
font-size:16px;
}

/* BUTTON */

.button{
display:inline-block;
margin-top:30px;
background:#3b82f6;
color:white;
padding:13px 30px;
border-radius:8px;
text-decoration:none;
font-weight:500;
font-size:15px;
transition:0.2s;
}

.button:hover{
background:#2563eb;
transform:translateY(-1px);
}

/* CARDS */

.cards{
margin-top:50px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
transition:0.25s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

.card h3{
margin-bottom:10px;
font-size:18px;
color:#1a202c;
}

.card p{
color:#718096;
font-size:14px;
}

/* FOOTER */

footer{
margin-top:70px;
background:white;
border-top:1px solid #e6e9ee;
text-align:center;
padding:25px;
font-size:14px;
color:#718096;
}

/* TABLET */

@media (max-width:900px){

.cards{
grid-template-columns:repeat(2,1fr);
}

.hero h1{
font-size:30px;
}

}

/* MOBILE */

@media (max-width:600px){

nav{
flex-direction:column;
align-items:flex-start;
}

.menu{
width:100%;
justify-content:space-between;
}

.cards{
grid-template-columns:1fr;
}

.hero{
padding:45px 25px;
}

.hero h1{
font-size:24px;
}

}

</style>

</head>

<body>

<header>

<nav>

<div class="logo">
Центр помощи семьям
</div>

<div class="menu">
<a href="/">Главная</a>
<a href="/reviews">Отзывы</a>
<a href="/about">О компании</a>
</div>

</nav>

</header>

<div class="container">

{% block content %}
{% endblock %}

</div>

<footer>
© 2026 Центр помощи семьям военнослужащих
</footer>

</body>
</html>
